# Block access to confidential files
location /.env {
    return 404;
}

# Route ALL /api/* requests to /api/index.php via PHP-FPM
location ^~ /api/ {
    fastcgi_pass unix:/tmp/php-cgi-83.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root/api/index.php;
    fastcgi_param SCRIPT_NAME /api/index.php;
    fastcgi_param REQUEST_URI $request_uri;
}

# Handle /api without trailing slash
location = /api {
    fastcgi_pass unix:/tmp/php-cgi-83.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root/api/index.php;
    fastcgi_param SCRIPT_NAME /api/index.php;
    fastcgi_param REQUEST_URI $request_uri;
}

# Serve static files directly, fallback to index.html for React Router
# Don't rewrite files or directories that exist — route everything else to index.html
location / {
    try_files $uri $uri/ /index.html;
    open_file_cache max=1000 inactive=20s;
}